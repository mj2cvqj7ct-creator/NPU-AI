name: Tests

on:
  push:
    branches: ["main", "cursor/**"]
  pull_request:
    branches: ["main"]

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal test deps
        run: pip install --upgrade pip && pip install "numpy>=1.26" "scipy>=1.12" "ruff>=0.8" "mypy>=1.8"

      - name: Ruff lint
        run: ruff check src tests

      - name: Mypy (src)
        run: mypy src --ignore-missing-imports

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
